<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Buddy Tutor</title>
    <!-- Firebase CDN (Bulletproof Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --buddy-c1: #6c5ce7;
            --buddy-c2: #a29bfe;
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 400px;
            height: 400px;
            overflow: hidden;
            background: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            /* Prevent text selection during drag */
        }

        .buddy-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* Let clicks pass through empty space */
        }

        /* Physics Wrapper */
        #physics-animator {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
            transform-origin: bottom center; /* Better jelly base */
        }

        /* The Robot Character */
        .buddy {
            position: relative;
            width: 120px;
            height: 140px;
            background: linear-gradient(135deg, var(--buddy-c1), var(--buddy-c2));
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            /* Make the buddy itself clickable */
            cursor: grab;
            transition: transform 0.1s ease-out, border-radius 0.4s ease, clip-path 0.4s ease;
        }

        /* Shape Customizations */
        .buddy.shape-circle { border-radius: 50%; }
        .buddy.shape-square { border-radius: 5px; }
        .buddy.shape-triangle { 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            border-radius: 0;
            box-shadow: none; /* Shadow breaks on clip path */
        }

        .buddy:active {
            cursor: grabbing;
        }

        .buddy.angry {
            animation: wiggle 0.2s ease infinite !important;
            box-shadow: 0 0 40px #ff7675 !important;
            background: linear-gradient(135deg, #ff4757, #ff6b81) !important;
        }

        .buddy::before {
            /* Head antenna */
            content: '';
            position: absolute;
            top: -15px;
            width: 4px;
            height: 15px;
            background: #6c5ce7;
        }

        .buddy::after {
            /* Head antenna tip */
            content: '';
            position: absolute;
            top: -22px;
            width: 10px;
            height: 10px;
            background: #e17055;
            border-radius: 50%;
            animation: blink-light 1s infinite alternate;
        }

        .eyes {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .eye {
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            animation: blink 4s infinite;
        }

        .mouth {
            width: 40px;
            height: 5px;
            background: #fff;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(5deg);
            }

            50% {
                transform: rotate(-5deg);
            }

            75% {
                transform: rotate(5deg);
            }
        }

        @keyframes blink {

            0%,
            45%,
            55%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(0.1);
            }
        }

        @keyframes blink-light {
            from {
                background: #e17055;
                box-shadow: 0 0 5px #e17055;
            }

            to {
                background: #fab1a0;
                box-shadow: 0 0 15px #ff7675;
            }
        }

        /* Speech Bubble */
        .bubble {
            position: absolute;
            bottom: 280px; /* Shifted higher up to clear the buddy */
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            max-width: 200px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; /* Do not block clicks */
            z-index: 9998; /* High, but under UI badges */
        }

        .bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }

        .message {
            font-size: 14px;
            color: #2d3436;
            margin: 0;
            text-align: center;
        }

        /* ID Badge & Naming UI */
        .id-badge {
            position: absolute;
            top: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: #6c5ce7;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 9999; /* Max Priority */
            cursor: pointer;
            border: 1px solid #a29bfe;
            transition: all 0.2s;
            pointer-events: auto !important; 
        }

        .id-badge:hover {
            transform: scale(1.05);
            background: white;
        }

        #name-input-container {
            position: absolute;
            top: 20px;
            z-index: 9999; /* Max Priority */
            display: none;
            background: white;
            border-radius: 15px;
            padding: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            pointer-events: auto !important;
        }

        #name-input-container input {
            padding: 5px 10px;
            border-radius: 10px;
            border: 2px solid #6c5ce7;
            font-size: 12px;
            outline: none;
        }

        /* Connection Request UI */
        #connect-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(108, 92, 231, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 20px;
        }

        #connect-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #connect-overlay p {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-accept {
            background: #55efc4;
            color: #00b894;
        }

        .btn-reject {
            background: #ff7675;
            color: white;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        /* Radial Menu Wrappers */
        #radial-menu-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 400;
        }

        .radial-btn-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            pointer-events: none;
            /* Will be translated using JS: transform: rotate(Xdeg) translateY(-100px) rotate(-Xdeg) */
        }

        .radial-btn-wrapper.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Solid Color Buttons */
        .radial-btn {
            width: 50px;
            height: 50px;
            margin-top: -25px;
            margin-left: -25px;
            background: var(--buddy-c1);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background 0.2s;
        }

        .radial-btn:hover {
            transform: scale(1.15);
            background: var(--buddy-c2);
        }

        .btn-fire {
            background: #d63031;
        }

        .btn-mint {
            background: #00b894;
        }

        .btn-sky {
            background: #0984e3;
        }

        .btn-back {
            background: #2d3436;
        }

        .btn-close {
            background: #ff7675;
        }

        .btn-purple { background: #6c5ce7; }
        .btn-yellow { background: #fdcb6e; color: #000; }
        .btn-pink { background: #fd79a8; }
        .btn-white { background: #ffffff; color: #000; border-color: #ddd; }

        /* Hats Overlay Layer */
        .hat-layer {
            position: absolute;
            top: -55px;
            font-size: 50px; 
            z-index: 10;
            pointer-events: none;
            transition: transform 0.3s;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* Real CSS Cowboy Hat */
        .real-cowboy-hat {
            display: none; /* Shown via JS */
            width: 70px;
            height: 12px;
            background: #5d4037;
            border-radius: 5px 5px 15px 15px;
            position: relative;
            top: 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .real-cowboy-hat::after {
            content: '';
            position: absolute;
            top: -18px;
            left: 15px;
            width: 40px;
            height: 22px;
            background: #5d4037;
            border-radius: 8px 8px 0 0;
            box-shadow: inset 0 -4px 0 #3e2723;
        }

        /* Bottom Input Bar for text tasks */
        #bottom-input-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 500;
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            align-items: center;
        }

        #bottom-input-bar.visible {
            transform: translateY(0);
        }

        #bottom-input-bar input {
            flex: 1;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 8px 10px;
            outline: none;
            font-size: 13px;
        }

        #bottom-input-bar input:focus {
            border-color: #6c5ce7;
        }

        .bar-btn {
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .bar-btn:hover {
            background: #5849c4;
        }

        #control-panel.visible {
            transform: translateY(0);
        }

        #control-panel h3 {
            margin: 0;
            font-size: 14px;
            color: #6c5ce7;
            text-align: center;
        }

        .control-row {
            display: flex;
            gap: 5px;
        }

        #control-panel input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
        }

        #control-panel input:focus {
            border-color: #6c5ce7;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 11px;
            border-radius: 8px;
            border: none;
            background: #6c5ce7;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: #5849c4;
        }

        .btn-small:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .interaction-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .btn-icon {
            padding: 10px;
            font-size: 16px;
            background: #f0f2f5;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-icon:hover {
            background: #e2e4e7;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            display: inline-block;
            margin-right: 5px;
        }

        .status-dot.connected {
            background: #55efc4;
            box-shadow: 0 0 5px #55efc4;
        }
    </style>

</head>

<body>
    <div id="connect-overlay">
        <p id="connect-request-text">A tutor wants to help! Accept?</p>
        <div class="btn-group">
            <button class="btn btn-accept" onclick="acceptBuddyUI()">Yes</button>
            <button class="btn btn-reject" onclick="rejectTutor()">No</button>
        </div>
    </div>

    <!-- Radial Menu Engine -->
    <div id="radial-menu-container">
        <!-- Rendered completely by JS but we can place static wrappers here if we want. We'll populate dynamically in JS! -->
    </div>

    <!-- Bottom Input Bar -->
    <div id="bottom-input-bar">
        <!-- Re-used between Network/Settings -->
        <span id="partner-status" class="status-dot" style="display:none;"></span>
        <input type="text" id="dynamic-input" placeholder="...">
        <button id="dynamic-btn" class="bar-btn">GO</button>
        <button class="bar-btn btn-back" onclick="closeBottomBar()">❌</button>
    </div>


    <div id="id-badge" class="id-badge" onclick="toggleNameInput()">Loading...</div>
    <div id="name-input-container">
        <input type="text" id="buddy-name-input" placeholder="Name your buddy..."
            onkeypress="if(event.key==='Enter') saveBuddyName()">
    </div>

    <div class="buddy-container">
        <div id="buddy-bubble" class="bubble">
            <p id="buddy-text" class="message">Hi! I'm your tutor buddy!</p>
        </div>
        <div id="physics-animator">
            <div id="hat-overlay" class="hat-layer">
                <span id="emoji-hat-span"></span>
                <div id="css-cowboy-hat" class="real-cowboy-hat"></div>
            </div>
            <div id="main-buddy" class="buddy">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div id="buddy-mouth" class="mouth"></div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
