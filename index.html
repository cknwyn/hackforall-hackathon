<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Buddy Tutor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --buddy-color: #6c5ce7;
            --buddy-scale: 1;
        }

        .buddy-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Let clicks pass through empty space */
        }

        .buddy-scaler {
            position: absolute;
            bottom: 120px;
            right: 110px;
            transform: scale(var(--buddy-scale));
            transform-origin: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* The Robot Character */
        .buddy {
            position: relative;
            width: 120px;
            height: 140px;
            background: var(--buddy-color);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
            pointer-events: auto; /* Make the buddy itself clickable */
        }

        .buddy::before { /* Head antenna */
            content: '';
            position: absolute;
            top: -15px;
            width: 4px;
            height: 15px;
            background: var(--buddy-color);
            filter: brightness(0.9); /* Slightly darker for contrast */
        }

        .buddy::after { /* Head antenna tip */
            content: '';
            position: absolute;
            top: -22px;
            width: 10px;
            height: 10px;
            background: #e17055;
            border-radius: 50%;
            animation: blink-light 1s infinite alternate;
        }

        .eyes {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .eye {
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            animation: blink 4s infinite;
        }

        .mouth {
            width: 40px;
            height: 5px;
            background: #fff;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes blink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        @keyframes blink-light {
            from { background: #e17055; box-shadow: 0 0 5px #e17055; }
            to { background: #fab1a0; box-shadow: 0 0 15px #ff7675; }
        }

        .bubble {
            position: absolute;
            bottom: calc(100% + 20px); /* Position above buddy body */
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: max-content;
            max-width: 200px;
            opacity: 0;
            transition: opacity 0.5s, transform 0.5s;
            pointer-events: auto;
            z-index: 50; /* Ensure it's on top */
        }

        .bubble.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }

        .message {
            font-size: 14px;
            color: #2d3436;
            margin: 0;
            text-align: center;
        }

        /* Circular Menu */
        .circular-menu {
            position: absolute;
            width: 240px;
            height: 240px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            border-radius: 50%;
        }

        .circular-menu.active .menu-item {
            pointer-events: auto;
            opacity: 1;
        }

        .menu-item {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s, background 0.2s;
            -webkit-app-region: no-drag;
            /* Center origins */
            top: 50%;
            left: 50%;
            margin-top: -20px;
            margin-left: -20px;
            opacity: 0;
            pointer-events: none;
        }

        .menu-item:hover {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
        }

        /* Inactive states (fade and rotate inwards) */
        .menu-item:nth-child(1) { transform: translate(0, 0) rotate(-180deg) scale(0.2); }
        .menu-item:nth-child(2) { transform: translate(0, 0) rotate(-180deg) scale(0.2); }
        .menu-item:nth-child(3) { transform: translate(0, 0) rotate(-180deg) scale(0.2); }
        .menu-item:nth-child(4) { transform: translate(0, 0) rotate(-180deg) scale(0.2); }

        /* Active states (positioned outwards) */
        .circular-menu.active .menu-item:nth-child(1) { transform: translate(0, -90px) rotate(0deg) scale(1); } /* Top */
        .circular-menu.active .menu-item:nth-child(2) { transform: translate(90px, 0) rotate(0deg) scale(1); }  /* Right */
        .circular-menu.active .menu-item:nth-child(3) { transform: translate(0, 90px) rotate(0deg) scale(1); }  /* Bottom */
        .circular-menu.active .menu-item:nth-child(4) { transform: translate(-90px, 0) rotate(0deg) scale(1); } /* Left */

        /* Hover states (enlarge) */
        .circular-menu.active .menu-item:nth-child(1):hover { transform: translate(0, -90px) rotate(0deg) scale(1.2); }
        .circular-menu.active .menu-item:nth-child(2):hover { transform: translate(90px, 0) rotate(0deg) scale(1.2); }
        .circular-menu.active .menu-item:nth-child(3):hover { transform: translate(0, 90px) rotate(0deg) scale(1.2); }
        .circular-menu.active .menu-item:nth-child(4):hover { transform: translate(-90px, 0) rotate(0deg) scale(1.2); }

        .settings-menu {
            position: absolute;
            bottom: 300px;
            right: 50px;
            width: 240px;
            background: rgba(45, 52, 54, 0.95);
            color: white;
            padding: 20px;
            border-radius: 15px;
            border: 20px solid var(--buddy-color);
            display: none;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .settings-menu.active {
            display: flex;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-settings-btn {
            background: #ff7675;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .settings-row {
            margin-bottom: 15px;
        }

        .settings-row label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .scale-slider {
            width: 100%;
            cursor: pointer;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .color-option {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .color-option.selected {
            border-color: white;
        }

        .settings-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .footer-btn {
            padding: 5px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s, color 0.3s;
        }

        .footer-btn.disabled {
            background: #636e72 !important;
            color: #b2bec3 !important;
            cursor: not-allowed;
        }

        #btn-save { background: #00b894; color: white; }
        #btn-cancel { background: #d63031; color: white; }

        /* Warning Box */
        .warning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent; /* Removed black background */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: auto;
        }

        .warning-box {
            background: #2d3436;
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            pointer-events: auto; /* Fix: allow clicks */
        }

        .warning-text {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .warning-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

    </style>
</head>
<body>
    <div class="buddy-container">
        <div class="buddy-scaler">
            <div id="buddy-bubble" class="bubble">
                <p id="buddy-text" class="message">Hi! I'm your tutor buddy!</p>
            </div>
            <div id="circular-menu" class="circular-menu">
                <button class="menu-item" id="btn-power" title="Dismiss">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                        <line x1="12" y1="2" x2="12" y2="12"></line>
                    </svg>
                </button>
                <button class="menu-item" id="btn-settings" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <button class="menu-item" id="btn-minimize" title="Minimize">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button class="menu-item" title="Placeholder 3">💬</button>
            </div>
            <div id="main-buddy" class="buddy">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div id="buddy-mouth" class="mouth"></div>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="settings-menu" class="settings-menu">
            <div class="settings-header">
                <span>Buddy Settings</span>
                <button id="btn-close-x" class="close-settings-btn">X</button>
            </div>
            <div class="settings-row">
                <label>Size (0.5x - 2x)</label>
                <input type="range" id="scale-slider" class="scale-slider" min="0.5" max="2" step="0.1" value="1">
            </div>
            <div class="settings-row">
                <label>Body Color</label>
                <div class="color-grid">
                    <div class="color-option selected" style="background: #6c5ce7;" data-color="#6c5ce7"></div>
                    <div class="color-option" style="background: #e17055;" data-color="#e17055"></div>
                    <div class="color-option" style="background: #00b894;" data-color="#00b894"></div>
                    <div class="color-option" style="background: #fdcb6e;" data-color="#fdcb6e"></div>
                    <div class="color-option" style="background: #e84393;" data-color="#e84393"></div>
                </div>
            </div>
            <div class="settings-footer">
                <button id="btn-cancel" class="footer-btn disabled">Cancel</button>
                <button id="btn-save" class="footer-btn disabled">Save</button>
            </div>
        </div>

        <!-- Warning Popup -->
        <div id="warning-overlay" class="warning-overlay">
            <div class="warning-box">
                <p class="warning-text">Any changes made will be discarded.</p>
                <div class="warning-footer">
                    <button id="btn-warning-cancel" class="footer-btn" style="background: #636e72; color: white;">Cancel</button>
                    <button id="btn-warning-close" class="footer-btn" style="background: #d63031; color: white;">Close</button>
                </div>
            </div>
        </div>

    </div>

    <script src="renderer.js"></script>
</body>
</html>
