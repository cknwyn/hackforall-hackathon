<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Buddy Tutor</title>
    <!-- Firebase CDN (Bulletproof Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 300px;
            height: 300px;
            overflow: hidden;
            background: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* Prevent text selection during drag */
        }

        .buddy-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Let clicks pass through empty space */
        }

        /* The Robot Character */
        .buddy {
            position: relative;
            width: 120px;
            height: 140px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
            pointer-events: auto; /* Make the buddy itself clickable */
            cursor: grab;
            transition: transform 0.1s ease-out;
        }

        .buddy:active {
            cursor: grabbing;
        }

        .buddy::before { /* Head antenna */
            content: '';
            position: absolute;
            top: -15px;
            width: 4px;
            height: 15px;
            background: #6c5ce7;
        }

        .buddy::after { /* Head antenna tip */
            content: '';
            position: absolute;
            top: -22px;
            width: 10px;
            height: 10px;
            background: #e17055;
            border-radius: 50%;
            animation: blink-light 1s infinite alternate;
        }

        .eyes {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .eye {
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            animation: blink 4s infinite;
        }

        .mouth {
            width: 40px;
            height: 5px;
            background: #fff;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        @keyframes blink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        @keyframes blink-light {
            from { background: #e17055; box-shadow: 0 0 5px #e17055; }
            to { background: #fab1a0; box-shadow: 0 0 15px #ff7675; }
        }

        /* Speech Bubble */
        .bubble {
            position: absolute;
            bottom: 220px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 200px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }

        .message {
            font-size: 14px;
            color: #2d3436;
            margin: 0;
            text-align: center;
        }

        /* ID Badge & Naming UI */
        .id-badge {
            position: absolute;
            top: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: #6c5ce7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
            cursor: pointer;
            border: 1px solid #a29bfe;
            transition: all 0.2s;
        }
        .id-badge:hover { transform: scale(1.05); background: white; }

        #name-input-container {
            position: absolute;
            top: 20px;
            z-index: 101;
            display: none;
        }
        #name-input-container input {
            padding: 5px 10px;
            border-radius: 10px;
            border: 2px solid #6c5ce7;
            font-size: 12px;
            outline: none;
        }

        /* Connection Request UI */
        #connect-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(108, 92, 231, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 20px;
        }

        #connect-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #connect-overlay p {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-accept { background: #55efc4; color: #00b894; }
        .btn-reject { background: #ff7675; color: white; }
        .btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="connect-overlay">
        <p>A tutor wants to help! Accept?</p>
        <div class="btn-group">
            <button class="btn btn-accept" onclick="acceptTutor()">Yes</button>
            <button class="btn btn-reject" onclick="rejectTutor()">No</button>
        </div>
    </div>

    <div id="id-badge" class="id-badge" onclick="toggleNameInput()">Loading...</div>
    <div id="name-input-container">
        <input type="text" id="buddy-name-input" placeholder="Name your buddy..." onkeypress="if(event.key==='Enter') saveBuddyName()">
    </div>

    <div class="buddy-container">
        <div id="buddy-bubble" class="bubble">
            <p id="buddy-text" class="message">Hi! I'm your tutor buddy!</p>
        </div>
        <div id="main-buddy" class="buddy">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div id="buddy-mouth" class="mouth"></div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
